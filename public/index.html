<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>致我爱的人</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- 粒子背景 -->
  <canvas id="particles"></canvas>

  <!-- 进度指示器 -->
  <div class="progress-bar" id="progressBar">
    <div class="progress-fill"></div>
  </div>

  <div class="progress-dots" id="progressDots"></div>

  <!-- ====== 封面 ====== -->
  <section class="story-section cover" id="section-cover">
    <div class="cover-content">
      <div class="cover-constellation">
        <svg viewBox="0 0 200 200" class="heart-constellation">
          <polyline points="100,170 40,100 100,40 160,100 100,170" fill="none" stroke="rgba(255,107,107,0.4)" stroke-width="1" stroke-dasharray="3,3"/>
          <circle cx="100" cy="170" r="2" fill="#FF6B6B"/>
          <circle cx="40" cy="100" r="2" fill="#FF6B6B"/>
          <circle cx="100" cy="40" r="2" fill="#FF6B6B"/>
          <circle cx="160" cy="100" r="2" fill="#FF6B6B"/>
        </svg>
      </div>
      <h1 class="cover-title" id="coverTitle">致我爱的人</h1>
      <p class="cover-subtitle" id="coverSubtitle">一个关于我们的故事</p>
      <p class="cover-greeting" id="coverGreeting">这些话，在心里藏了很久</p>
      <div class="scroll-hint">
        <span>向下滚动</span>
        <div class="scroll-arrow"></div>
      </div>
    </div>
  </section>

  <!-- ====== 故事章节（动态插入） ====== -->
  <div id="sectionsContainer"></div>

  <!-- ====== 聊天记录墙 ====== -->
  <section class="story-section chat-wall" id="section-chats">
    <div class="section-inner">
      <h2 class="section-title reveal">我们的聊天</h2>
      <div class="chat-container" id="chatContainer">
        <div class="chat-empty" id="chatEmpty">
          <div class="chat-empty-icon">💬</div>
          <p>聊天记录会出现在这里</p>
          <p class="chat-empty-hint">通过管理后台添加</p>
        </div>
      </div>
    </div>
  </section>

  <!-- ====== 结尾 ====== -->
  <section class="story-section ending" id="section-ending">
    <div class="ending-content">
      <h2 class="ending-title reveal" id="endingTitle">故事还很长，我们慢慢写</h2>
      <div class="ending-hearts" id="endingHearts"></div>
      <p class="ending-note reveal" id="endingNote"></p>
      <p class="ending-note-small reveal">用心写给你的每一行代码</p>
    </div>
  </section>

  <script src="/js/main.js"></script>
</body>
</html>
