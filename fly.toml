app = "love-site"
primary_region = "ord"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "data"
  destination = "/data"

[env]
  ADMIN_PASSWORD = "yirunxin"
  DATA_DIR = "/data"
  UPLOAD_DIR = "/data/uploads"
